services:
  db-backup:
    build:
      context: .
      dockerfile: Dockerfile
    image: db-backup:1.0.0
    container_name: db-backup
    restart: unless-stopped
    environment:
      # Database Configuration
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAMES: ${DB_NAMES}
      DB_SSL_MODE: ${DB_SSL_MODE:-DISABLED}
      DB_SSL_CA: ${DB_SSL_CA:-}
      
      # S3 Configuration
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PATH_PREFIX: ${S3_PATH_PREFIX:-backups}
      S3_REGION: ${S3_REGION:-us-east-1}
      
      # API & Backup Settings
      BACKUP_API_KEY: ${BACKUP_API_KEY:-}
      BACKUP_TIMEOUT: ${BACKUP_TIMEOUT:-3600}
    
    # Optional: Network configuration for Coolify
    # networks:
    #   - coolify
    
    ports:
      - "8000:8000"
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Optional: Uncomment if using Coolify network
# networks:
#   coolify:
#     external: true
